<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقة عيد مبارك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4a843;
    --gold-light: #f0cc6e;
    --gold-dark: #8a6515;
    --deep: #040d1a;
    --ink: #0a1628;
    --accent: #00c9b1;
    --accent2: #7b5ea7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #060e1c;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Tajawal', sans-serif;
    padding: 30px 16px;
    gap: 24px;
  }

  /* ───── CARD ───── */
  .card {
    width: 100%;
    max-width: 480px;
    min-height: 640px;
    background: var(--ink);
    border-radius: 32px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(212,168,67,0.25),
      0 40px 80px rgba(0,0,0,0.7),
      0 0 120px rgba(0,201,177,0.06);
  }

  /* ── noise grain overlay ── */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
    border-radius: 32px;
  }

  /* ── ambient glow blobs ── */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
  }
  .blob-1 { width: 300px; height: 300px; background: rgba(0,201,177,0.12); top: -80px; right: -80px; animation: drift1 8s ease-in-out infinite; }
  .blob-2 { width: 250px; height: 250px; background: rgba(123,94,167,0.15); bottom: -60px; left: -60px; animation: drift2 10s ease-in-out infinite; }
  .blob-3 { width: 180px; height: 180px; background: rgba(212,168,67,0.08); top: 50%; left: 50%; transform: translate(-50%,-50%); animation: drift3 6s ease-in-out infinite; }

  @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,20px)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-20px)} }
  @keyframes drift3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.3)} }

  /* ── geometric lines bg ── */
  .geo-bg {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image:
      repeating-linear-gradient(45deg, #d4a843 0, #d4a843 1px, transparent 0, transparent 50%),
      repeating-linear-gradient(-45deg, #d4a843 0, #d4a843 1px, transparent 0, transparent 50%);
    background-size: 40px 40px;
  }

  /* ── top border glow ── */
  .top-glow {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--gold-light), var(--accent2), transparent);
    z-index: 5;
  }

  /* ── photo zone ── */
  .photo-zone {
    position: relative;
    width: 100%;
    height: 280px;
    overflow: hidden;
    cursor: pointer;
    z-index: 2;
  }

  .photo-zone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s ease, filter 0.4s ease;
  }

  .photo-zone:hover img { transform: scale(1.04); }

  .photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(4,13,26,0) 30%,
      rgba(4,13,26,0.6) 70%,
      rgba(10,22,40,0.98) 100%);
  }

  /* upload placeholder */
  .upload-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: linear-gradient(135deg, #0d1f3a, #0a1628);
    cursor: pointer;
    transition: background 0.3s;
  }
  .upload-placeholder:hover { background: linear-gradient(135deg, #112340, #0d1e36); }

  .upload-icon {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 2px dashed rgba(212,168,67,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: rgba(212,168,67,0.6);
    transition: all 0.3s;
  }
  .upload-placeholder:hover .upload-icon {
    border-color: var(--gold);
    color: var(--gold);
    transform: scale(1.1);
  }
  .upload-text { color: rgba(212,168,67,0.5); font-size: 14px; font-weight: 300; letter-spacing: 1px; }

  /* ── floating badge ── */
  .badge {
    position: absolute;
    top: 18px;
    left: 18px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(212,168,67,0.3);
    border-radius: 30px;
    padding: 6px 14px;
    font-size: 11px;
    color: var(--gold-light);
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 4;
    animation: fadeDown 1s ease 0.5s both;
  }

  /* ── moon crescent decoration ── */
  .moon-deco {
    position: absolute;
    top: 18px;
    right: 18px;
    z-index: 4;
    animation: fadeDown 1s ease 0.7s both;
  }
  .moon-deco svg { width: 40px; height: 40px; filter: drop-shadow(0 0 8px rgba(212,168,67,0.5)); }

  /* ── content ── */
  .content {
    position: relative;
    z-index: 3;
    padding: 28px 32px 36px;
    text-align: center;
  }

  /* ── divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    animation: fadeUp 0.9s ease 0.3s both;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(212,168,67,0.4)); }
  .divider-line.r { background: linear-gradient(90deg, rgba(212,168,67,0.4), transparent); }
  .divider-star { color: var(--gold); font-size: 14px; }

  /* ── main title ── */
  .main-title {
    font-size: clamp(42px, 10vw, 58px);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 8px;
    animation: fadeUp 0.9s ease 0.5s both;
    background: linear-gradient(135deg, #f0cc6e 0%, #d4a843 40%, #ffffff 60%, #d4a843 80%, #f0cc6e 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 0.9s ease 0.5s both, shimmer 4s linear 1.5s infinite;
  }

  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .sub-title {
    font-size: 18px;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    letter-spacing: 4px;
    margin-bottom: 24px;
    animation: fadeUp 0.9s ease 0.7s both;
  }

  /* ── message box ── */
  .message-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(212,168,67,0.15);
    border-radius: 20px;
    padding: 20px 24px;
    margin-bottom: 24px;
    position: relative;
    animation: fadeUp 0.9s ease 0.9s both;
  }
  .message-box::before {
    content: '❝';
    position: absolute;
    top: -14px;
    right: 24px;
    font-size: 32px;
    color: var(--gold);
    line-height: 1;
  }
  .message-text {
    font-size: 17px;
    font-weight: 400;
    color: rgba(255,255,255,0.82);
    line-height: 2;
  }

  /* ── name tag ── */
  .name-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    animation: fadeUp 0.9s ease 1.1s both;
  }
  .name-label { font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 2px; }
  .name-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
  }

  /* ── share button ── */
  .btn-share {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 36px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.9s ease 1.3s both;
    letter-spacing: 1px;
    box-shadow: 0 8px 30px rgba(0,201,177,0.3);
  }
  .btn-share::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-share:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(0,201,177,0.4); }
  .btn-share:hover::before { opacity: 1; }
  .btn-share:active { transform: translateY(0); }

  /* ── bottom stars ── */
  .stars-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 20px;
    animation: fadeUp 0.9s ease 1.5s both;
  }
  .star-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.3;
  }
  .star-dot.active { opacity: 1; width: 20px; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--gold)); }

  /* ── particles ── */
  .particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 1; }
  .p {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: var(--gold-light);
    opacity: 0;
    animation: rise var(--d, 6s) ease-in var(--delay, 0s) infinite;
  }
  @keyframes rise {
    0% { transform: translateY(100%) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.1; }
    100% { transform: translateY(-100px) translateX(var(--drift, 20px)); opacity: 0; }
  }

  /* ── animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── CONTROLS PANEL ── */
  .controls {
    width: 100%;
    max-width: 480px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .controls-title {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
  .field-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 16px;
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s;
    direction: rtl;
  }
  .field-input:focus { border-color: rgba(0,201,177,0.5); }
  .field-input::placeholder { color: rgba(255,255,255,0.2); }

  textarea.field-input { resize: none; height: 90px; line-height: 1.8; }

  .upload-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 13px;
    border-radius: 12px;
    border: 1.5px dashed rgba(212,168,67,0.35);
    background: rgba(212,168,67,0.04);
    color: rgba(212,168,67,0.7);
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
  }
  .upload-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(212,168,67,0.08); }

  #file-input { display: none; }

  /* ══════════ PHOTO PREVIEW MODAL ══════════ */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(12px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: #0d1e38;
    border: 1px solid rgba(212,168,67,0.25);
    border-radius: 28px;
    width: 100%;
    max-width: 500px;
    overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(212,168,67,0.1);
    animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes modalIn {
    from { opacity:0; transform:scale(0.88) translateY(24px); }
    to   { opacity:1; transform:scale(1) translateY(0); }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .modal-title { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 1px; }
  .modal-hint { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 2px; }
  .modal-close {
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.5); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; line-height: 1;
  }
  .modal-close:hover { background: rgba(255,80,80,0.15); border-color: rgba(255,80,80,0.3); color: #ff6b6b; }

  .crop-viewport {
    position: relative; width: 100%; overflow: hidden;
    background: #040c1a; cursor: grab; user-select: none; touch-action: none;
  }
  .crop-viewport:active { cursor: grabbing; }
  .crop-viewport.ratio-sq  { aspect-ratio: 1/1; }
  .crop-viewport.ratio-45  { aspect-ratio: 4/5; }
  .crop-viewport.ratio-169 { aspect-ratio: 16/9; }

  .crop-viewport img {
    position: absolute; transform-origin: center center;
    pointer-events: none; will-change: transform;
  }
  .crop-grid {
    position: absolute; inset: 0; pointer-events: none; z-index: 2;
    background-image:
      linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 33.33% 33.33%;
  }
  .crop-border {
    position: absolute; inset: 0;
    border: 2px solid rgba(212,168,67,0.55);
    pointer-events: none; z-index: 3;
    box-shadow: inset 0 0 30px rgba(212,168,67,0.08);
  }
  /* corner handles */
  .crop-border::before, .crop-border::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--gold);
    border-style: solid;
  }
  .crop-border::before { top: -2px; right: -2px; border-width: 3px 3px 0 0; }
  .crop-border::after  { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; }

  .modal-controls { padding: 16px 24px; display: flex; flex-direction: column; gap: 14px; }

  .ratio-row { display: flex; gap: 8px; align-items: center; }
  .ctrl-label { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 1px; min-width: 44px; }
  .ratio-btn {
    flex: 1; padding: 8px 4px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.09);
    background: rgba(255,255,255,0.03);
    color: rgba(255,255,255,0.45); font-family: 'Tajawal', sans-serif;
    font-size: 12px; cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .ratio-btn:hover { border-color: rgba(212,168,67,0.35); color: rgba(212,168,67,0.8); }
  .ratio-btn.active { background: rgba(212,168,67,0.14); border-color: var(--gold); color: var(--gold-light); font-weight: 700; }

  .slider-row { display: flex; align-items: center; gap: 12px; }
  .s-icon { font-size: 13px; color: rgba(255,255,255,0.3); min-width: 18px; text-align: center; }
  .ctrl-slider {
    flex: 1; -webkit-appearance: none; height: 4px;
    border-radius: 2px; background: rgba(255,255,255,0.1); outline: none; cursor: pointer;
  }
  .ctrl-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    cursor: grab; box-shadow: 0 2px 10px rgba(212,168,67,0.45); transition: transform 0.15s;
  }
  .ctrl-slider::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.25); }
  .ctrl-val { font-size: 12px; color: var(--gold); min-width: 38px; text-align: left; font-weight: 700; }

  .modal-actions { display: flex; gap: 10px; padding: 0 24px 22px; }
  .btn-cancel {
    flex: 1; padding: 13px; border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.09);
    background: rgba(255,255,255,0.03);
    color: rgba(255,255,255,0.45); font-family: 'Tajawal', sans-serif;
    font-size: 15px; cursor: pointer; transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: rgba(255,80,80,0.3); color: #ff8888; }
  .btn-apply {
    flex: 2; padding: 13px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.25s;
    box-shadow: 0 6px 20px rgba(0,201,177,0.25); letter-spacing: 1px;
  }
  .btn-apply:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,201,177,0.38); }
</style>
</head>
<body>

<!-- ═══════════ CARD ═══════════ -->
<div class="card" id="card">
  <div class="geo-bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="top-glow"></div>

  <!-- particles -->
  <div class="particles" id="particles"></div>

  <!-- photo -->
  <div class="photo-zone" id="photo-zone" onclick="document.getElementById('file-input').click()">
    <div class="upload-placeholder" id="upload-placeholder">
      <div class="upload-icon">🖼</div>
      <span class="upload-text">أضف صورتك هنا</span>
    </div>
    <img id="card-img" src="" alt="" style="display:none;">
    <div class="photo-overlay"></div>

    <!-- badge -->
    <div class="badge">✦ عيد مبارك ✦</div>

    <!-- moon -->
    <div class="moon-deco">
      <svg viewBox="0 0 40 40" fill="none">
        <path d="M28 8C22 8 16 13 16 20C16 27 22 32 28 32C24 32 12 28 12 20C12 12 24 8 28 8Z" fill="#d4a843" opacity="0.9"/>
        <circle cx="30" cy="10" r="2" fill="#f0cc6e" opacity="0.7"/>
        <circle cx="34" cy="18" r="1.5" fill="#f0cc6e" opacity="0.5"/>
      </svg>
    </div>
  </div>

  <!-- content -->
  <div class="content">
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-star">✦</span>
      <span class="divider-star" style="font-size:18px;color:var(--gold-light);">☽</span>
      <span class="divider-star">✦</span>
      <div class="divider-line r"></div>
    </div>

    <h1 class="main-title" id="main-title">عيد مبارك</h1>
    <p class="sub-title" id="sub-title">Eid Mubarak</p>

    <div class="message-box">
      <p class="message-text" id="message-text">
        كل عام وأنتم بخير وعساكم من عواده،<br>
        أعاده الله عليكم بالخير والبركة والسعادة
      </p>
    </div>

    <div class="name-section">
      <span class="name-label">من</span>
      <span class="name-value" id="name-display">— أدخل اسمك —</span>
    </div>

    <button class="btn-share" onclick="share()">
      <span>مشاركة البطاقة</span>
      <span>🎁</span>
    </button>

    <div class="stars-row">
      <div class="star-dot"></div>
      <div class="star-dot active"></div>
      <div class="star-dot"></div>
    </div>
  </div>
</div>

<!-- ═══════════ PHOTO PREVIEW MODAL ═══════════ -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">📐 ضبط الصورة</div>
        <div class="modal-hint">اسحب لتحريك · زوّم · اختر النسبة</div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="crop-viewport ratio-45" id="crop-vp">
      <img id="preview-img" src="" alt="">
      <div class="crop-grid"></div>
      <div class="crop-border"></div>
    </div>

    <div class="modal-controls">
      <div class="ratio-row">
        <span class="ctrl-label">النسبة</span>
        <button class="ratio-btn" data-ratio="ratio-sq"  onclick="setRatio(this)">■ 1:1</button>
        <button class="ratio-btn active" data-ratio="ratio-45" onclick="setRatio(this)">▬ 4:5</button>
        <button class="ratio-btn" data-ratio="ratio-169" onclick="setRatio(this)">▬ 16:9</button>
      </div>
      <div class="slider-row">
        <span class="s-icon">🔍</span>
        <input type="range" class="ctrl-slider" id="zoom-slider" min="50" max="300" value="100" oninput="updateZoom(this.value)">
        <span class="ctrl-val" id="zoom-val">100%</span>
      </div>
      <div class="slider-row">
        <span class="s-icon">☀️</span>
        <input type="range" class="ctrl-slider" id="bright-slider" min="50" max="160" value="100" oninput="updateBright(this.value)">
        <span class="ctrl-val" id="bright-val">100%</span>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
      <button class="btn-apply" onclick="applyPhoto()">✓ تطبيق الصورة</button>
    </div>
  </div>
</div>

<!-- ═══════════ CONTROLS ═══════════ -->
<div class="controls">
  <div class="controls-title">✦ خصّص بطاقتك</div>

  <div class="field-group">
    <span class="field-label">العنوان الرئيسي</span>
    <input class="field-input" id="input-title" type="text" placeholder="عيد مبارك" value="عيد مبارك"
      oninput="document.getElementById('main-title').textContent = this.value || 'عيد مبارك'">
  </div>

  <div class="field-group">
    <span class="field-label">عبارة التهنئة</span>
    <textarea class="field-input" id="input-msg" placeholder="اكتب عبارتك هنا..."
      oninput="document.getElementById('message-text').innerHTML = this.value.replace(/\n/g,'<br>')">كل عام وأنتم بخير وعساكم من عواده،
أعاده الله عليكم بالخير والبركة والسعادة</textarea>
  </div>

  <div class="field-group">
    <span class="field-label">اسم المرسل</span>
    <input class="field-input" id="input-name" type="text" placeholder="اسمك أو اسم العائلة"
      oninput="document.getElementById('name-display').textContent = this.value || '— أدخل اسمك —'">
  </div>

  <div class="field-group">
    <span class="field-label">الصورة</span>
    <label class="upload-btn" for="file-input">
      <span>📸</span>
      <span>اختر صورة من جهازك</span>
    </label>
    <input type="file" id="file-input" accept="image/*" onchange="loadImage(event)">
  </div>
</div>

<script>
// ── particles
const pc = document.getElementById('particles');
for(let i=0;i<18;i++){
  const p = document.createElement('div');
  p.className = 'p';
  p.style.cssText = `left:${Math.random()*100}%;bottom:0;--d:${4+Math.random()*6}s;--delay:${Math.random()*6}s;--drift:${(Math.random()-0.5)*80}px;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;`;
  pc.appendChild(p);
}

// ══════════ PHOTO PREVIEW STATE ══════════
let imgSrc = '';
let zoom = 100, brightness = 100;
let offsetX = 0, offsetY = 0;
let dragging = false, startX, startY, startOX, startOY;

const vp       = document.getElementById('crop-vp');
const prevImg  = document.getElementById('preview-img');
const zoomSl   = document.getElementById('zoom-slider');
const brightSl = document.getElementById('bright-slider');

// ── open modal after file chosen
function loadImage(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    imgSrc = ev.target.result;
    // reset state
    zoom = 100; brightness = 100; offsetX = 0; offsetY = 0;
    zoomSl.value = 100; brightSl.value = 100;
    document.getElementById('zoom-val').textContent   = '100%';
    document.getElementById('bright-val').textContent = '100%';
    prevImg.src = imgSrc;
    prevImg.onload = () => {
      fitImage();
      openModal();
    };
  };
  reader.readAsDataURL(file);
  // reset so same file can be re-uploaded
  e.target.value = '';
}

function fitImage(){
  const vpW = vp.clientWidth  || 460;
  const vpH = vp.clientHeight || 575;
  const natW = prevImg.naturalWidth;
  const natH = prevImg.naturalHeight;
  const scale = Math.max(vpW / natW, vpH / natH);
  // base size
  prevImg.style.width  = natW + 'px';
  prevImg.style.height = natH + 'px';
  prevImg._baseScale = scale;
  offsetX = 0; offsetY = 0;
  applyTransform();
}

function applyTransform(){
  const s = (prevImg._baseScale || 1) * (zoom / 100);
  prevImg.style.transform =
    `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px)) scale(${s})`;
  prevImg.style.filter = `brightness(${brightness}%)`;
  prevImg.style.left = '50%';
  prevImg.style.top  = '50%';
}

function updateZoom(v){
  zoom = +v;
  document.getElementById('zoom-val').textContent = v + '%';
  applyTransform();
}

function updateBright(v){
  brightness = +v;
  document.getElementById('bright-val').textContent = v + '%';
  applyTransform();
}

// ── drag
vp.addEventListener('mousedown', e => {
  dragging = true; startX = e.clientX; startY = e.clientY;
  startOX = offsetX; startOY = offsetY;
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if(!dragging) return;
  offsetX = startOX + (e.clientX - startX);
  offsetY = startOY + (e.clientY - startY);
  applyTransform();
});
window.addEventListener('mouseup', () => dragging = false);

// touch
vp.addEventListener('touchstart', e => {
  if(e.touches.length === 1){
    dragging = true;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    startOX = offsetX; startOY = offsetY;
  }
}, {passive:true});
vp.addEventListener('touchmove', e => {
  if(!dragging || e.touches.length !== 1) return;
  offsetX = startOX + (e.touches[0].clientX - startX);
  offsetY = startOY + (e.touches[0].clientY - startY);
  applyTransform();
}, {passive:true});
vp.addEventListener('touchend', () => dragging = false);

// pinch-to-zoom
let lastPinchDist = null;
vp.addEventListener('touchmove', e => {
  if(e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    if(lastPinchDist){
      zoom = Math.min(300, Math.max(50, zoom * (dist / lastPinchDist)));
      zoomSl.value = Math.round(zoom);
      document.getElementById('zoom-val').textContent = Math.round(zoom) + '%';
      applyTransform();
    }
    lastPinchDist = dist;
  } else { lastPinchDist = null; }
}, {passive:true});
vp.addEventListener('touchend', () => lastPinchDist = null);

// wheel zoom
vp.addEventListener('wheel', e => {
  e.preventDefault();
  zoom = Math.min(300, Math.max(50, zoom - e.deltaY * 0.2));
  zoomSl.value = Math.round(zoom);
  document.getElementById('zoom-val').textContent = Math.round(zoom) + '%';
  applyTransform();
}, {passive:false});

// ── ratio
function setRatio(btn){
  document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  vp.className = 'crop-viewport ' + btn.dataset.ratio;
  // re-fit after layout reflows
  requestAnimationFrame(() => { fitImage(); zoom = +zoomSl.value; applyTransform(); });
}

// ── modal open/close
function openModal(){
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
  requestAnimationFrame(() => applyTransform());
}
function closeModal(){
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}

// ── apply to card
function applyPhoto(){
  // snapshot the current view into a canvas then apply to card
  const vpW  = vp.clientWidth;
  const vpH  = vp.clientHeight;
  const s    = (prevImg._baseScale || 1) * (zoom / 100);
  const natW = prevImg.naturalWidth;
  const natH = prevImg.naturalHeight;

  const canvas = document.createElement('canvas');
  canvas.width  = vpW;
  canvas.height = vpH;
  const ctx = canvas.getContext('2d');

  // bright
  ctx.filter = `brightness(${brightness}%)`;

  // compute draw position matching CSS transform
  const drawW = natW * s;
  const drawH = natH * s;
  const drawX = vpW/2 - drawW/2 + offsetX;
  const drawY = vpH/2 - drawH/2 + offsetY;

  const tmpImg = new Image();
  tmpImg.onload = () => {
    ctx.drawImage(tmpImg, drawX, drawY, drawW, drawH);
    const dataURL = canvas.toDataURL('image/jpeg', 0.92);
    // apply to card
    const cardImg = document.getElementById('card-img');
    cardImg.src = dataURL;
    cardImg.style.display = 'block';
    cardImg.style.filter = 'none';
    document.getElementById('upload-placeholder').style.display = 'none';
    closeModal();
  };
  tmpImg.src = imgSrc;
}

// ── share
function share(){
  if(navigator.share){
    navigator.share({title:'بطاقة عيد مبارك', text:'عيد مبارك 🎉', url: location.href});
  } else {
    navigator.clipboard.writeText(location.href).then(()=>{
      const btn = document.querySelector('.btn-share span');
      btn.textContent = 'تم النسخ ✓';
      setTimeout(()=>btn.textContent='مشاركة البطاقة',2000);
    });
  }
}
</script>
</body>
</html>
