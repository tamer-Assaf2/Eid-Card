<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقة عيد مبارك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4a843;
    --gold-light: #f0cc6e;
    --gold-dark: #8a6515;
    --deep: #040d1a;
    --ink: #0a1628;
    --accent: #00c9b1;
    --accent2: #7b5ea7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #060e1c;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Tajawal', sans-serif;
    padding: 30px 16px;
    gap: 24px;
  }

  /* ───── CARD ───── */
  .card {
    width: 100%;
    max-width: 480px;
    min-height: 640px;
    background: var(--ink);
    border-radius: 32px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(212,168,67,0.25),
      0 40px 80px rgba(0,0,0,0.7),
      0 0 120px rgba(0,201,177,0.06);
  }

  /* ── noise grain overlay ── */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
    border-radius: 32px;
  }

  /* ── ambient glow blobs ── */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
  }
  .blob-1 { width: 300px; height: 300px; background: rgba(0,201,177,0.12); top: -80px; right: -80px; animation: drift1 8s ease-in-out infinite; }
  .blob-2 { width: 250px; height: 250px; background: rgba(123,94,167,0.15); bottom: -60px; left: -60px; animation: drift2 10s ease-in-out infinite; }
  .blob-3 { width: 180px; height: 180px; background: rgba(212,168,67,0.08); top: 50%; left: 50%; transform: translate(-50%,-50%); animation: drift3 6s ease-in-out infinite; }

  @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,20px)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-20px)} }
  @keyframes drift3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.3)} }

  /* ── geometric lines bg ── */
  .geo-bg {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image:
      repeating-linear-gradient(45deg, #d4a843 0, #d4a843 1px, transparent 0, transparent 50%),
      repeating-linear-gradient(-45deg, #d4a843 0, #d4a843 1px, transparent 0, transparent 50%);
    background-size: 40px 40px;
  }

  /* ── top border glow ── */
  .top-glow {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--gold-light), var(--accent2), transparent);
    z-index: 5;
  }

  /* ── photo zone ── */
  .photo-zone {
    position: relative;
    width: 100%;
    height: 280px;
    overflow: hidden;
    cursor: pointer;
    z-index: 2;
  }

  .photo-zone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s ease, filter 0.4s ease;
  }

  .photo-zone:hover img { transform: scale(1.04); }

  .photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(4,13,26,0) 30%,
      rgba(4,13,26,0.6) 70%,
      rgba(10,22,40,0.98) 100%);
  }

  /* upload placeholder */
  .upload-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: linear-gradient(135deg, #0d1f3a, #0a1628);
    cursor: pointer;
    transition: background 0.3s;
  }
  .upload-placeholder:hover { background: linear-gradient(135deg, #112340, #0d1e36); }

  .upload-icon {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 2px dashed rgba(212,168,67,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: rgba(212,168,67,0.6);
    transition: all 0.3s;
  }
  .upload-placeholder:hover .upload-icon {
    border-color: var(--gold);
    color: var(--gold);
    transform: scale(1.1);
  }
  .upload-text { color: rgba(212,168,67,0.5); font-size: 14px; font-weight: 300; letter-spacing: 1px; }

  /* ── floating badge ── */
  .badge {
    position: absolute;
    top: 18px;
    left: 18px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(212,168,67,0.3);
    border-radius: 30px;
    padding: 6px 14px;
    font-size: 11px;
    color: var(--gold-light);
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 4;
    animation: fadeDown 1s ease 0.5s both;
  }

  /* ── moon crescent decoration ── */
  .moon-deco {
    position: absolute;
    top: 18px;
    right: 18px;
    z-index: 4;
    animation: fadeDown 1s ease 0.7s both;
  }
  .moon-deco svg { width: 40px; height: 40px; filter: drop-shadow(0 0 8px rgba(212,168,67,0.5)); }

  /* ── content ── */
  .content {
    position: relative;
    z-index: 3;
    padding: 28px 32px 36px;
    text-align: center;
  }

  /* ── divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    animation: fadeUp 0.9s ease 0.3s both;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(212,168,67,0.4)); }
  .divider-line.r { background: linear-gradient(90deg, rgba(212,168,67,0.4), transparent); }
  .divider-star { color: var(--gold); font-size: 14px; }

  /* ── main title ── */
  .main-title {
    font-size: clamp(42px, 10vw, 58px);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 8px;
    animation: fadeUp 0.9s ease 0.5s both;
    background: linear-gradient(135deg, #f0cc6e 0%, #d4a843 40%, #ffffff 60%, #d4a843 80%, #f0cc6e 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 0.9s ease 0.5s both, shimmer 4s linear 1.5s infinite;
  }

  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .sub-title {
    font-size: 18px;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    letter-spacing: 4px;
    margin-bottom: 24px;
    animation: fadeUp 0.9s ease 0.7s both;
  }

  /* ── message box ── */
  .message-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(212,168,67,0.15);
    border-radius: 20px;
    padding: 20px 24px;
    margin-bottom: 24px;
    position: relative;
    animation: fadeUp 0.9s ease 0.9s both;
  }
  .message-box::before {
    content: '❝';
    position: absolute;
    top: -14px;
    right: 24px;
    font-size: 32px;
    color: var(--gold);
    line-height: 1;
  }
  .message-text {
    font-size: 17px;
    font-weight: 400;
    color: rgba(255,255,255,0.82);
    line-height: 2;
  }

  /* ── name tag ── */
  .name-section {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    animation: fadeUp 0.9s ease 1.1s both;
  }
  .name-label { font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 2px; }
  .name-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
  }

  /* ── share button ── */
  .btn-share {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 36px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.9s ease 1.3s both;
    letter-spacing: 1px;
    box-shadow: 0 8px 30px rgba(0,201,177,0.3);
  }
  .btn-share::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-share:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(0,201,177,0.4); }
  .btn-share:hover::before { opacity: 1; }
  .btn-share:active { transform: translateY(0); }

  /* ── bottom stars ── */
  .stars-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 20px;
    animation: fadeUp 0.9s ease 1.5s both;
  }
  .star-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.3;
  }
  .star-dot.active { opacity: 1; width: 20px; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--gold)); }

  /* ── particles ── */
  .particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 1; }
  .p {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: var(--gold-light);
    opacity: 0;
    animation: rise var(--d, 6s) ease-in var(--delay, 0s) infinite;
  }
  @keyframes rise {
    0% { transform: translateY(100%) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.1; }
    100% { transform: translateY(-100px) translateX(var(--drift, 20px)); opacity: 0; }
  }

  /* ── animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── CONTROLS PANEL ── */
  .controls {
    width: 100%;
    max-width: 480px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .controls-title {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
  .field-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 16px;
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s;
    direction: rtl;
  }
  .field-input:focus { border-color: rgba(0,201,177,0.5); }
  .field-input::placeholder { color: rgba(255,255,255,0.2); }

  textarea.field-input { resize: none; height: 90px; line-height: 1.8; }

  .upload-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 13px;
    border-radius: 12px;
    border: 1.5px dashed rgba(212,168,67,0.35);
    background: rgba(212,168,67,0.04);
    color: rgba(212,168,67,0.7);
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
  }
  .upload-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(212,168,67,0.08); }

  #file-input { display: none; }
</style>
</head>
<body>

<!-- ═══════════ CARD ═══════════ -->
<div class="card" id="card">
  <div class="geo-bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="top-glow"></div>

  <!-- particles -->
  <div class="particles" id="particles"></div>

  <!-- photo -->
  <div class="photo-zone" id="photo-zone" onclick="document.getElementById('file-input').click()">
    <div class="upload-placeholder" id="upload-placeholder">
      <div class="upload-icon">🖼</div>
      <span class="upload-text">أضف صورتك هنا</span>
    </div>
    <img id="card-img" src="" alt="" style="display:none;">
    <div class="photo-overlay"></div>

    <!-- badge -->
    <div class="badge">✦ عيد مبارك ✦</div>

    <!-- moon -->
    <div class="moon-deco">
      <svg viewBox="0 0 40 40" fill="none">
        <path d="M28 8C22 8 16 13 16 20C16 27 22 32 28 32C24 32 12 28 12 20C12 12 24 8 28 8Z" fill="#d4a843" opacity="0.9"/>
        <circle cx="30" cy="10" r="2" fill="#f0cc6e" opacity="0.7"/>
        <circle cx="34" cy="18" r="1.5" fill="#f0cc6e" opacity="0.5"/>
      </svg>
    </div>
  </div>

  <!-- content -->
  <div class="content">
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-star">✦</span>
      <span class="divider-star" style="font-size:18px;color:var(--gold-light);">☽</span>
      <span class="divider-star">✦</span>
      <div class="divider-line r"></div>
    </div>

    <h1 class="main-title" id="main-title">عيد مبارك</h1>
    <p class="sub-title" id="sub-title">Eid Mubarak</p>

    <div class="message-box">
      <p class="message-text" id="message-text">
        كل عام وأنتم بخير وعساكم من عواده،<br>
        أعاده الله عليكم بالخير والبركة والسعادة
      </p>
    </div>

    <div class="name-section">
      <span class="name-label">من</span>
      <span class="name-value" id="name-display">— أدخل اسمك —</span>
    </div>

    <button class="btn-share" onclick="share()">
      <span>مشاركة البطاقة</span>
      <span>🎁</span>
    </button>

    <div class="stars-row">
      <div class="star-dot"></div>
      <div class="star-dot active"></div>
      <div class="star-dot"></div>
    </div>
  </div>
</div>

<!-- ═══════════ CONTROLS ═══════════ -->
<div class="controls">
  <div class="controls-title">✦ خصّص بطاقتك</div>

  <div class="field-group">
    <span class="field-label">العنوان الرئيسي</span>
    <input class="field-input" id="input-title" type="text" placeholder="عيد مبارك" value="عيد مبارك"
      oninput="document.getElementById('main-title').textContent = this.value || 'عيد مبارك'">
  </div>

  <div class="field-group">
    <span class="field-label">عبارة التهنئة</span>
    <textarea class="field-input" id="input-msg" placeholder="اكتب عبارتك هنا..."
      oninput="document.getElementById('message-text').innerHTML = this.value.replace(/\n/g,'<br>')">كل عام وأنتم بخير وعساكم من عواده،
أعاده الله عليكم بالخير والبركة والسعادة</textarea>
  </div>

  <div class="field-group">
    <span class="field-label">اسم المرسل</span>
    <input class="field-input" id="input-name" type="text" placeholder="اسمك أو اسم العائلة"
      oninput="document.getElementById('name-display').textContent = this.value || '— أدخل اسمك —'">
  </div>

  <div class="field-group">
    <span class="field-label">الصورة</span>
    <label class="upload-btn" for="file-input">
      <span>📸</span>
      <span>اختر صورة من جهازك</span>
    </label>
    <input type="file" id="file-input" accept="image/*" onchange="loadImage(event)">
  </div>
</div>

<script>
// ── particles
const pc = document.getElementById('particles');
for(let i=0;i<18;i++){
  const p = document.createElement('div');
  p.className = 'p';
  p.style.cssText = `left:${Math.random()*100}%;bottom:0;--d:${4+Math.random()*6}s;--delay:${Math.random()*6}s;--drift:${(Math.random()-0.5)*80}px;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;`;
  pc.appendChild(p);
}

// ── image upload
function loadImage(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('card-img');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('upload-placeholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ── share
function share(){
  if(navigator.share){
    navigator.share({title:'بطاقة عيد مبارك', text:'عيد مبارك 🎉', url: location.href});
  } else {
    // copy link fallback
    navigator.clipboard.writeText(location.href).then(()=>{
      const btn = document.querySelector('.btn-share span');
      btn.textContent = 'تم النسخ ✓';
      setTimeout(()=>btn.textContent='مشاركة البطاقة',2000);
    });
  }
}
</script>
</body>
</html>
