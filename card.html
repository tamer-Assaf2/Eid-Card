<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>بطاقة معايدة</title>
</head>

<body>

<div class="card">
  <div class="overlay"></div>

  <h1>🎉 عيد سعيد</h1>
  <p id="name">كل عام وأنتم بخير</p>

  <button onclick="share()">مشاركة 🎁</button>
</div>

<script>
const params = new URLSearchParams(location.search);
const name = params.get("name");

if(name){
document.getElementById("name").innerText = "تهنئة خاصة لـ " + name;
}

function share(){
navigator.share({
title:"بطاقة معايدة",
text:"بطاقة جميلة 🎉",
url:location.href
});
}
</script>

</body>
</html>
