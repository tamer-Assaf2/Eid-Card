<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1206;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  gap: 20px;
  font-family: 'Amiri', serif;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  width: 20%;
  max-width: 960px;
}

/* ===== CARD 1: Luxury Gold ===== */
.card-gold {
  width: 100%;
  aspect-ratio: 3/4;
  background: linear-gradient(160deg, #1a1206 0%, #2c1e06 40%, #1a0e02 100%);
  border-radius: 20px;
  border: 1.5px solid #c9a227;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  overflow: hidden;
}

.card-gold::before {
  content: '';
  position: absolute;
  inset: 6px;
  border-radius: 16px;
  border: 0.5px solid rgba(201,162,39,0.35);
  pointer-events: none;
}

.ornament-top {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  width: 180px;
  opacity: 0.85;
}

.ornament-bottom {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%) rotate(180deg);
  width: 180px;
  opacity: 0.85;
}

.gold-badge {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #f5e27a, #c9a227, #7a5c10);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin-bottom: 20px;
  box-shadow: 0 0 30px rgba(201,162,39,0.4);
  border: 2px solid rgba(245,226,122,0.3);
}

.card-title-gold {
  font-family: 'Amiri', serif;
  font-size: 36px;
  font-weight: 700;
  color: #f5e27a;
  text-align: center;
  line-height: 1.3;
  letter-spacing: 2px;
  margin-bottom: 10px;
  text-shadow: 0 0 20px rgba(201,162,39,0.6);
}

.card-subtitle-gold {
  font-size: 16px;
  color: #c9a227;
  text-align: center;
  line-height: 1.8;
  opacity: 0.9;
}

.corner-ornament {
  position: absolute;
  width: 50px;
  height: 50px;
  opacity: 0.5;
}
.corner-tl { top: 14px; left: 14px; }
.corner-tr { top: 14px; right: 14px; transform: scaleX(-1); }
.corner-bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
.corner-br { bottom: 14px; right: 14px; transform: scale(-1,-1); }

/* ===== CARD 2: Modern Minimal ===== */
.card-modern {
  width: 100%;
  aspect-ratio: 3/4;
  background: #faf7f2;
  border-radius: 20px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  overflow: hidden;
  border: 1px solid #e8e0d0;
}

.card-modern .accent-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, #e8593c, #f2a623, #e8593c);
}

.card-modern .big-number {
  font-family: 'Playfair Display', serif;
  font-size: 120px;
  color: #f2e8d8;
  position: absolute;
  top: 20px;
  right: -10px;
  line-height: 1;
  font-weight: 700;
  user-select: none;
}

.card-modern .icon-circle {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: linear-gradient(135deg, #e8593c, #f2a623);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  margin-bottom: 20px;
  box-shadow: 0 8px 30px rgba(232,89,60,0.3);
}

.card-title-modern {
  font-family: 'Amiri', serif;
  font-size: 32px;
  font-weight: 700;
  color: #2c1e06;
  text-align: center;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
}

.card-subtitle-modern {
  font-size: 15px;
  color: #7a6048;
  text-align: center;
  line-height: 1.9;
  position: relative;
  z-index: 1;
}

.dots-pattern {
  position: absolute;
  bottom: 20px;
  left: 20px;
  display: grid;
  grid-template-columns: repeat(6,10px);
  gap: 6px;
  opacity: 0.18;
}

/* ===== CARD 3: Vibrant Gradient ===== */
.card-vibrant {
  width: 100%;
  aspect-ratio: 3/4;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  border-radius: 20px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  overflow: hidden;
}

.bubble1, .bubble2, .bubble3 {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  opacity: 0.5;
  pointer-events: none;
}
.bubble1 { width:200px; height:200px; background:#00c6ff; top:-60px; right:-60px; }
.bubble2 { width:180px; height:180px; background:#7b2ff7; bottom:-50px; left:-50px; }
.bubble3 { width:120px; height:120px; background:#f9cb42; bottom:80px; right:30px; opacity:0.3; }

.card-vibrant .stars {
  position: absolute;
  inset: 0;
  background-image: radial-gradient(1.5px 1.5px at 20% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 80% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 70%, rgba(255,255,255,0.4) 0%, transparent 100%);
}

.card-vibrant .moon-icon {
  font-size: 60px;
  margin-bottom: 16px;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 0 20px rgba(0,198,255,0.6));
}

.card-title-vibrant {
  font-family: 'Amiri', serif;
  font-size: 38px;
  font-weight: 700;
  color: #ffffff;
  text-align: center;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
  text-shadow: 0 0 30px rgba(0,198,255,0.5);
}

.card-subtitle-vibrant {
  font-size: 15px;
  color: rgba(255,255,255,0.75);
  text-align: center;
  line-height: 1.9;
  position: relative;
  z-index: 1;
}

.card-vibrant .glow-line {
  width: 80px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #00c6ff, transparent);
  margin: 16px auto;
  position: relative;
  z-index: 1;
}

/* Tags */
.style-tag {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  font-family: sans-serif;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
  align-self: center;
}
.tag-gold { background: rgba(201,162,39,0.15); color: #c9a227; border: 1px solid rgba(201,162,39,0.3); }
.tag-modern { background: rgba(232,89,60,0.1); color: #e8593c; border: 1px solid rgba(232,89,60,0.25); }
.tag-vibrant { background: rgba(0,198,255,0.1); color: #00c6ff; border: 1px solid rgba(0,198,255,0.25); }

.card-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

h2 {
  font-family: 'Amiri', serif;
  color: #c9a227;
  font-size: 28px;
  text-align: center;
  margin-bottom: 4px;
}
p.subtitle { color: #8a7060; font-size: 14px; font-family: sans-serif; text-align: center; margin-bottom: 16px; }

@keyframes shimmer {
  0%, 100% { opacity: 0.85; }
  50% { opacity: 1; }
}
.card-title-gold { animation: shimmer 3s ease-in-out infinite; }
</style>
</head>
<body>

<h2>🎨 3 أنماط لبطاقات المعايدة</h2>
<p class="subtitle">كل نمط يستهدف جمهوراً مختلفاً — مناسبة للبيع على كانفا</p>

<div class="cards-grid">

  

  <!-- CARD 3 -->
  <div class="card-wrapper">
    <span class="style-tag tag-vibrant">جريء — للشباب</span>
    <div class="card-vibrant">
      <div class="stars"></div>
      <div class="bubble1"></div>
      <div class="bubble2"></div>
      <div class="bubble3"></div>

      <div class="moon-icon">🌙</div>
      <div class="card-title-vibrant">رمضان كريم</div>
      <div class="glow-line"></div>
      <div class="card-subtitle-vibrant">
        أعاده الله عليكم بالخير<br>
        والبركة والسلام
      </div>

      <div style="margin-top:24px;display:flex;gap:12px;position:relative;z-index:1;">
        <div style="width:36px;height:36px;border-radius:50%;background:rgba(0,198,255,0.15);border:1px solid rgba(0,198,255,0.3);display:flex;align-items:center;justify-content:center;font-size:18px;">⭐</div>
        <div style="width:36px;height:36px;border-radius:50%;background:rgba(123,47,247,0.15);border:1px solid rgba(123,47,247,0.3);display:flex;align-items:center;justify-content:center;font-size:18px;">✨</div>
        <div style="width:36px;height:36px;border-radius:50%;background:rgba(249,203,66,0.15);border:1px solid rgba(249,203,66,0.3);display:flex;align-items:center;justify-content:center;font-size:18px;">🌟</div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
